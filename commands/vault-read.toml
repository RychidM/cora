description = "Read the full content of a vault file or entry."
prompt = """
You are operating on RM's Obsidian memory vault. Read GEMINI.md (this extension's context file) for the vault location and path-resolution rules before acting.

Follow this procedure. If `skills/vault-read/SKILL.md` exists in this extension directory, read it for the full algorithm and follow it precisely; otherwise use the summary below.

Use the `vault-read` skill to return the complete content of one resolved
target — a project file, an idea, a single issue, a brand file, or a log
entry — rather than search snippets.

Argument: what to read, e.g.
- `/vault-read agentwatch overview`
- `/vault-read product ideas`
- `/vault-read ISSUE-003`
- `/vault-read brand profile`

If the target is ambiguous, the skill lists candidates and asks.
Read-only — never writes.

User request / arguments: {{args}}
"""
